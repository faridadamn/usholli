name: usholli
description: Aplikasi masjid — jadwal salat, Al-Quran, komunitas jamaah

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  http: ^1.2.0
  dio: ^5.4.0

  # URL launcher (untuk Midtrans payment redirect)
  url_launcher: ^6.2.6

  # Lokasi GPS
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # Notifikasi lokal (adzan)
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.0

  # Push notification (OneSignal)
  onesignal_flutter: ^5.1.2

  # Audio adzan
  just_audio: ^0.9.36

  # State management
  provider: ^6.1.2

  # Penyimpanan lokal
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  lottie: ^3.1.0

  # Permission
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/images/
    - assets/lottie/
